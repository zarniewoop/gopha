video:
  width: 1920
  height: 1080
  fps: 50
  duration: 10

timebase:
  anchor_period: 1.0

hdr:
  peak_luminance: 1000

scene:
  name: procedural_discs
  plasma_seed: 6969        # change for different plasma patterns
  discs:
    - color: [1.0, 0.3, 0.1]
      size: 0.25
      radius: 0.6
      speed_x: 0.3
      speed_y: 0.2
      rotation_speed: 0.5
      n_gaps: 5             # number of ring gaps
      gap_width: 0.03       # width of each gap
