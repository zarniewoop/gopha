video:
  width: 1920
  height: 1080
  fps: 50
  duration: 10

timebase:
  anchor_period: 1.0

hdr:
  peak_luminance: 1000

scene:
  name: procedural_discs_v2
  plasma_seed: 4242        # change for different plasma patterns

  # Explosion overlay
  explosion_seed: 7777     # determines origin, particle count & directions
  explosion_speed: 0.6     # 0.0 = barely moving, 1.0 = fast
  explosion_num_particles: 60   # optional override (otherwise seed-derived 40–80)
  explosion_particle_size: 1.2  # visual radius multiplier
  explosion_glow: 3.0           # halo extent relative to core

  discs:
    - color: [1.0, 0.3, 0.1]
      size: 0.25
      radius: 0.6
      speed_x: 0.4
      speed_y: 0.2
      rotation_speed: 0.5
      n_slots: 5
      slot_width: 0.8
    - color: [0.8, 0.5, 0.4]
      size: 0.1
      radius: 0.5
      speed_x: 0.5
      speed_y: 0.7
      rotation_speed: -0.1
      n_slots: 10
      slot_width: 0.2
    - color: [0.8, 0.5, 0.4]
      size: 0.1
      radius: 0.4
      speed_x: 0.2
      speed_y: 0.7
      rotation_speed: 3
      n_slots: 2
      slot_width: 0.03
    - color: [1.0, 0.3, 0.1]
      size: 0.3
      radius: 0.8
      speed_x: 0.3
      speed_y: 0.1
      rotation_speed: 0.5
      n_slots: 8
      slot_width: 0.3
    - color: [0.2, 0.6, 1.0]
      size: 0.09
      radius: 0.9
      speed_x: 0.35
      speed_y: 0.28
      rotation_speed: -0.6
      n_slots: 6
      slot_width: 0.25

output:
  filename: output_50p_Pv2v9_420.y4m
  bitdepth: 10
  transfer: pq
  matrix: bt2020
  chroma: "420"
  range: "limited"
  frame_tags: "XTEST=1"